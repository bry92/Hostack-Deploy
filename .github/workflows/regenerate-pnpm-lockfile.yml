name: Regenerate pnpm-lock.yaml on Linux

on:
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Enable corepack and activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
          pnpm -v

      - name: Regenerate lockfile
        id: regen
        run: |
          set -e
          rm -f pnpm-lock.yaml
          pnpm install
          if [ -n "$(git status --porcelain)" ]; then
            BRANCH="regenerate-pnpm-lockfile-$(date +%s)"
            git checkout -b "$BRANCH"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add pnpm-lock.yaml
            git commit -m "chore: regenerate pnpm-lock.yaml for Linux"
            git push --set-upstream origin "$BRANCH"
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.regen.outputs.no_changes != 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: chore: regenerate pnpm-lock.yaml for Linux
          title: chore: regenerate pnpm-lock.yaml for Linux
          body: |
            This PR regenerates `pnpm-lock.yaml` on an Ubuntu runner so that platform-specific binaries are Linux-native. It was created automatically by a GitHub Action.
          base: main
          head: ${{ steps.regen.outputs.branch }}
