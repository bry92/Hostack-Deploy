packages:
  "framer-motion": "Smooth page transitions and micro-interactions"
  "date-fns": "Human-readable date formatting for deployment timestamps"
  "@hookform/resolvers": "Zod validation for forms"
  "zod": "Schema validation for forms"
  "lucide-react": "Icons for UI"
  "clsx": "Utility for conditionally joining classNames"
  "tailwind-merge": "Utility for merging tailwind classes safely"
  "@radix-ui/react-slot": "Required for some shadcn components"
  "@radix-ui/react-dialog": "Accessible modal dialogs"
  "@radix-ui/react-dropdown-menu": "Accessible dropdowns"
  "@radix-ui/react-tabs": "Accessible tabs for project detail page"
  "@radix-ui/react-toast": "Accessible toast notifications"

images:
  - path: "artifacts/hostack/public/images/hero-glow.png"
    description: "Abstract dark background with subtle sleek electric blue and cyan glowing geometric mesh gradients, conveying modern cloud hosting infrastructure, professional SaaS aesthetic, completely dark and minimal"
    aspect_ratio: "16:9"

notes:
  - Using @workspace/auth-web for authentication state and login/logout redirects
  - Assuming API runs on the same domain with /api prefix
  - Using @workspace/api-client-react for TanStack Query hooks
