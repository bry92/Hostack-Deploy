      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBuildRuleBody"
      responses:
        "200":
          description: Updated build rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildRule"
        "401":
          description: Unauthorized
        "404":
          description: Not found
