          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of deploy webhooks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeployWebhookListResponse"
        "401":
          description: Unauthorized
        "404":
          description: Project not found
    post:
      operationId: createDeployWebhook
      tags: [deploy-webhooks]
      summary: Generate a new deploy webhook
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeployWebhookBody"
      responses:
        "201":
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeployWebhook"
        "401":
          description: Unauthorized
        "404":
          description: Project not found

  /projects/{projectId}/deploy-webhooks/{webhookId}:
    delete:
      operationId: deleteDeployWebhook
      tags: [deploy-webhooks]
      summary: Delete a deploy webhook
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /webhooks/{projectId}/{secret}:
    post:
      operationId: triggerDeployWebhook
      tags: [deploy-webhooks]
      summary: Trigger a deployment via webhook (public, no auth required)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: secret
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                branch:
                  type: string
                  description: Branch name to deploy. Defaults to "main" if not provided.
      responses:
        "200":
          description: Webhook received but deployment was skipped (e.g. auto-deploy disabled)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                  - message
        "201":
          description: Deployment triggered
          content:
            application/json:
              schema:
                type: object
                properties:
                  deployment:
                    $ref: "#/components/schemas/Deployment"
                required:
                  - deployment
        "404":
          description: Invalid webhook

  /projects/{projectId}/health:
    get:
