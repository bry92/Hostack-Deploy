openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Hostack API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Auth operations
  - name: projects
    description: Project operations
  - name: deployments
    description: Deployment operations
  - name: environment-variables
    description: Environment variable operations
  - name: profile
    description: Profile operations
  - name: integrations
    description: Integration operations
  - name: observability
    description: Runtime logs and metrics
  - name: ssh-keys
    description: SSH key management for repository access
  - name: domains
    description: Custom domain management
  - name: copilot
    description: AI Deploy Copilot
  - name: notifications
    description: Deploy notification settings
  - name: build-rules
    description: Build rules for automated deployments
  - name: deploy-webhooks
    description: Deploy webhook management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      operationId: getCurrentAuthUser
      tags: [auth]
      summary: Get current auth user
      responses:
        "200":
          description: Current auth user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCurrentAuthUserResponse"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProfile
      tags: [profile]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all user projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectBody"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/deployments:
    get:
      operationId: listProjectDeployments
      tags: [deployments]
      summary: List deployments for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of deployments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentListResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: triggerDeployment
      tags: [deployments]
      summary: Trigger a new deployment
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TriggerDeploymentBody"
      responses:
        "201":
          description: Deployment triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /deployments:
    get:
      operationId: listAllDeployments
      tags: [deployments]
      summary: List all deployments for the current user
      responses:
        "200":
          description: List of deployments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /deployments/{deploymentId}:
    get:
      operationId: getDeployment
      tags: [deployments]
      summary: Get a deployment by ID
      parameters:
        - name: deploymentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deployment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /deployments/{deploymentId}/promote:
    post:
      operationId: promoteDeployment
      tags: [deployments]
      summary: Promote a preview deployment to production
      parameters:
        - name: deploymentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Promoted deployment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/deployments/{deploymentId}/rollback:
    post:
      operationId: rollbackDeployment
      tags: [deployments]
      summary: Roll back to a previous successful deployment
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: deploymentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Rollback deployment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deployment"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/copilot/chat:
    post:
      operationId: copilotChat
      tags: [copilot]
      summary: Stream AI copilot chat response for a project
      description: Accepts a user message and optional conversation history, returns an SSE stream of AI-generated tokens.
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CopilotChatBody"
      responses:
        "200":
          description: SSE stream of chat tokens
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /deployments/{deploymentId}/logs:
    get:
      operationId: getDeploymentLogs
      tags: [deployments]
      summary: Get logs for a deployment
      parameters:
        - name: deploymentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deployment logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentLogsResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/github:
    get:
      operationId: getGitHubConnection
      tags: [projects]
      summary: Get GitHub connection status for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: GitHub connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitHubConnectionStatus"
    post:
      operationId: connectGitHub
      tags: [projects]
      summary: Connect GitHub to a project via PAT
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectGitHubBody"
      responses:
        "200":
          description: Connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitHubConnectionStatus"
    delete:
      operationId: disconnectGitHub
      tags: [projects]
      summary: Disconnect GitHub from a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitHubConnectionStatus"

  /projects/{projectId}/webhook:
    get:
      operationId: getWebhookInfo
      tags: [projects]
      summary: Get webhook URL and metadata for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Webhook info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookInfo"

  /projects/{projectId}/webhook/regenerate:
    post:
      operationId: regenerateWebhookSecret
      tags: [projects]
      summary: Regenerate the webhook secret for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: New webhook info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegenerateWebhookSecretResponse"

  /github/webhook:
    post:
      operationId: receiveGitHubWebhook
      tags: [projects]
      summary: Receive GitHub webhook events
      responses:
        "200":
          description: Received
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean

  /projects/{projectId}/notification-settings:
    get:
      operationId: getNotificationSettings
      tags: [notifications]
      summary: Get notification settings for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notification settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettingsResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateNotificationSettings
      tags: [notifications]
      summary: Create or update notification settings
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNotificationSettingsBody"
      responses:
        "200":
          description: Updated notification setting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettingResponse"
        "201":
          description: Created notification setting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettingResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/notification-settings/{settingId}:
    delete:
      operationId: deleteNotificationSetting
      tags: [notifications]
      summary: Delete a notification setting
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: settingId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/notification-settings/test:
    post:
      operationId: testNotification
      tags: [notifications]
      summary: Send a test notification to configured channels
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Test notification sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestNotificationResponse"
        "400":
          description: Failed to send
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestNotificationResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/env-vars:
    get:
      operationId: listEnvVars
      tags: [environment-variables]
      summary: List environment variables for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of environment variables
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvVarListResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createEnvVar
      tags: [environment-variables]
      summary: Create an environment variable
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnvVarBody"
      responses:
        "201":
          description: Created environment variable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvVar"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/env-vars/{envVarId}:
    delete:
      operationId: deleteEnvVar
      tags: [environment-variables]
      summary: Delete an environment variable
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: envVarId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [projects]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /integrations:
    get:
      operationId: listIntegrations
      tags: [integrations]
      summary: List all account integrations
      responses:
        "200":
          description: Integration list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationListResponse"
        "401":
          description: Unauthorized
    post:
      operationId: connectIntegration
      tags: [integrations]
      summary: Connect or update an integration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectIntegrationBody"
      responses:
        "201":
          description: Integration created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"
        "200":
          description: Integration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"
        "401":
          description: Unauthorized

  /integrations/{id}:
    get:
      operationId: getIntegration
      tags: [integrations]
      summary: Get a single integration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Integration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    patch:
      operationId: updateIntegration
      tags: [integrations]
      summary: Update an integration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIntegrationBody"
      responses:
        "200":
          description: Updated integration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Integration"
        "401":
          description: Unauthorized
    delete:
      operationId: disconnectIntegration
      tags: [integrations]
      summary: Disconnect an integration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success
        "401":
          description: Unauthorized

  /projects/{projectId}/runtime-logs:
    get:
      operationId: listRuntimeLogs
      tags: [observability]
      summary: List runtime logs for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: level
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: deploymentId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Runtime logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeLogListResponse"
        "401":
          description: Unauthorized
    post:
      operationId: createRuntimeLog
      tags: [observability]
      summary: Ingest a runtime log entry
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRuntimeLogBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeLog"
    delete:
      operationId: clearRuntimeLogs
      tags: [observability]
      summary: Clear all runtime logs for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success

  /projects/{projectId}/runtime-logs/simulate:
    post:
      operationId: simulateRuntimeLogs
      tags: [observability]
      summary: Generate sample runtime logs for demo
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                deploymentId:
                  type: string
                count:
                  type: integer
      responses:
        "200":
          description: Simulated logs created
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: integer
                required:
                  - created

  /projects/{projectId}/metrics/summary:
    get:
      operationId: getMetricsSummary
      tags: [observability]
      summary: Get aggregated metrics summary for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: deploymentId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Metrics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsSummary"
        "401":
          description: Unauthorized

  /projects/{projectId}/metrics:
    get:
      operationId: listMetrics
      tags: [observability]
      summary: List raw metric data points
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: deploymentId
          in: query
          schema:
            type: string
        - name: metricName
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Metrics list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsListResponse"

  /projects/{projectId}/metrics/simulate:
    post:
      operationId: simulateMetrics
      tags: [observability]
      summary: Generate sample metrics for demo
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                deploymentId:
                  type: string
      responses:
        "200":
          description: Simulated metrics created
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: integer
                required:
                  - created

  /projects/{projectId}/ssh-key:
    get:
      operationId: getProjectSshKey
      tags: [ssh-keys]
      summary: Get the SSH public key for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SSH key (public key only) or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SshKeyResponse"
        "401":
          description: Unauthorized
    delete:
      operationId: deleteProjectSshKey
      tags: [ssh-keys]
      summary: Delete the SSH key for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
