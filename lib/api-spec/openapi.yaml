              schema:
                $ref: "#/components/schemas/BuildRuleListResponse"
        "401":
          description: Unauthorized
        "404":
          description: Project not found
    post:
      operationId: createBuildRule
      tags: [build-rules]
      summary: Create a build rule
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBuildRuleBody"
      responses:
        "201":
          description: Build rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildRule"
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: Project not found

